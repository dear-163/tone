<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToneTurbo Pro</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--s1:#161b22;--s2:#21262d;--bd:#30363d;--ac:#7c3aed;--a2:#a78bfa;--pos:#34d399;--neg:#f87171;--lit:#fb923c;--unc:#94a3b8;--neu:#64748b;--tx:#e6edf3;--tx2:#8b949e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px}
.mono{font-family:'IBM Plex Mono',monospace}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:10px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.spin{animation:spin .8s linear infinite}
.fade-in{animation:fadeIn .3s ease-out}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:12px}
.btn{border:none;border-radius:8px;padding:9px 14px;font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s;font-family:'Noto Sans TC',sans-serif}
.btn-primary{background:var(--ac);color:#fff;width:100%}
.btn-primary:hover{background:#6d28d9;transform:translateY(-1px)}
.btn-primary:disabled{background:var(--s2);color:var(--tx2);cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;border:1px solid var(--bd);color:var(--tx2)}
.btn-ghost:hover{border-color:var(--a2);color:var(--a2)}
input,textarea,select{background:var(--s2);border:1px solid var(--bd);color:var(--tx);border-radius:8px;padding:9px 13px;font-size:13px;font-family:'Noto Sans TC',sans-serif;width:100%;outline:none;transition:border-color .15s}
input:focus,textarea:focus,select:focus{border-color:var(--a2)}
textarea{resize:vertical;min-height:110px}
input::placeholder,textarea::placeholder{color:var(--tx2)}
.layout{max-width:1280px;margin:0 auto;padding:24px 20px}
.grid{display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:start}
.col{display:flex;flex-direction:column;gap:16px}
/* Header */
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
.logo-box{background:linear-gradient(135deg,#7c3aed,#9d4edd);padding:10px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.logo-text{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:700}
.logo-text span{background:linear-gradient(135deg,var(--ac),#9d4edd);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{font-size:9px;font-weight:700;color:var(--tx2);letter-spacing:.15em;text-transform:uppercase;margin-top:3px}
/* Tabs */
.tab-bar{display:flex;background:var(--s2);border-radius:8px;padding:3px;gap:2px;margin-bottom:14px}
.tab{flex:1;padding:7px;border:none;background:transparent;color:var(--tx2);border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s;font-family:'Noto Sans TC',sans-serif}
.tab.active{background:var(--ac);color:#fff}
/* Upload zone */
.upload-zone{border:2px dashed var(--bd);border-radius:12px;padding:28px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover{border-color:var(--ac);background:rgba(124,58,237,.05)}
/* Queue */
.queue-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.q-item{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:7px 10px;display:flex;align-items:center;justify-content:space-between;font-size:11px;font-weight:700}
.q-item.active{border-color:var(--ac);background:rgba(124,58,237,.1)}
.q-item.done{border-color:var(--pos)}
.q-item.error{border-color:var(--neg)}
/* Progress */
.prog{height:2px;background:var(--s2);border-radius:1px;overflow:hidden;margin-top:10px}
.prog-fill{height:100%;background:var(--ac);transition:width .3s}
/* Table */
table{width:100%;border-collapse:collapse}
th{background:var(--s2);padding:9px 12px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);text-align:left;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:5}
td{padding:9px 12px;font-size:12px;border-bottom:1px solid rgba(48,54,61,.5);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
/* Tone bar */
.tbar{width:70px;height:5px;background:var(--s2);border-radius:3px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:5px}
.tbar-fill{height:100%;border-radius:3px}
/* Badges */
.badge{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px;border-radius:4px}
.b-pos{background:rgba(52,211,153,.15);color:var(--pos)}
.b-neg{background:rgba(248,113,113,.15);color:var(--neg)}
.b-lit{background:rgba(251,146,60,.15);color:var(--lit)}
.b-unc{background:rgba(148,163,184,.15);color:var(--unc)}
.b-neu{background:rgba(100,116,139,.15);color:var(--neu)}
.b-none{background:var(--s2);color:var(--tx2)}
.b-ai-on{background:rgba(52,211,153,.15);color:var(--pos);display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px}
.b-ai-off{background:rgba(251,146,60,.15);color:var(--lit);display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px}
/* Stat grid */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:12px 14px}
.stat-n{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;margin-bottom:4px}
.stat-l{font-size:9px;color:var(--tx2);text-transform:uppercase;letter-spacing:.08em}
/* API key bar */
.api-bar{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px}
.api-bar.on{border-color:rgba(52,211,153,.5)}
.api-bar.off{border-color:rgba(251,146,60,.4)}
/* Detail modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:16px;width:100%;max-width:900px;max-height:85vh;display:flex;flex-direction:column;animation:fadeIn .2s ease-out}
.modal-hdr{padding:18px 22px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.modal-body{overflow-y:auto;padding:14px 22px;flex:1}
.filter-bar{padding:10px 22px;border-bottom:1px solid var(--bd);display:flex;gap:5px;flex-wrap:wrap}
.filt-btn{padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border:1px solid var(--bd);background:transparent;color:var(--tx2);font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.filt-btn.active{background:var(--ac);color:#fff;border-color:var(--ac)}
/* Sentence card */
.s-card{margin-bottom:8px;padding:11px;background:var(--s2);border-radius:8px;border:1px solid var(--bd)}
.s-card.neutral{background:rgba(100,116,139,.05);border-color:rgba(100,116,139,.3)}
.s-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:6px}
.s-text{font-size:13px;line-height:1.6;margin-bottom:6px}
.s-text.dim{color:var(--tx2)}
.chips{display:flex;flex-wrap:wrap;gap:2px;padding-top:8px;border-top:1px solid var(--bd)}
.chip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;display:inline-block}
.cp-pos{background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.3);color:var(--pos)}
.cp-neg{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);color:var(--neg)}
.cp-lit{background:rgba(251,146,60,.12);border:1px solid rgba(251,146,60,.3);color:var(--lit)}
.cp-unc{background:rgba(148,163,184,.12);border:1px solid rgba(148,163,184,.3);color:var(--unc)}
/* Exclusion panel */
.excl-panel{background:var(--s1);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.excl-hdr{width:100%;padding:11px 14px;background:transparent;border:none;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.excl-body{padding:0 14px 14px;border-top:1px solid var(--bd)}
.excl-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;background:rgba(100,116,139,.15);border:1px solid rgba(100,116,139,.3);color:var(--neu);margin:3px}
.excl-tag button{background:none;border:none;cursor:pointer;color:var(--neu);font-size:11px;opacity:.6;padding:0}
.excl-tag button:hover{opacity:1;color:var(--neg)}
.cat-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border-radius:4px;margin-right:5px}
.cat-greeting{background:rgba(52,211,153,.1);color:#6ee7b7}
.cat-serial{background:rgba(251,146,60,.1);color:#fdba74}
.cat-time{background:rgba(148,163,184,.1);color:#94a3b8}
.cat-presentation{background:rgba(99,102,241,.1);color:#a5b4fc}
.cat-closing{background:rgba(248,113,113,.1);color:#fca5a5}
.cat-qa_host{background:rgba(251,191,36,.1);color:#fcd34d}
.cat-transition{background:rgba(34,211,238,.1);color:#67e8f9}
.cat-custom{background:rgba(167,139,250,.1);color:var(--a2)}
/* Processing badge */
.proc-badge{display:flex;align-items:center;gap:8px;background:var(--s1);border:1px solid var(--ac);border-radius:10px;padding:7px 14px}
/* scroll */
.scroll-box{overflow-y:auto;overflow-x:auto}
/* empty state */
.empty{padding:50px;text-align:center;color:var(--tx2);font-size:11px;letter-spacing:.12em;text-transform:uppercase}
/* detail view btn */
.view-btn{font-size:10px;font-weight:700;color:var(--a2);background:transparent;border:1px solid rgba(124,58,237,.4);border-radius:6px;padding:3px 8px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.view-btn:hover{background:rgba(124,58,237,.2)}
footer{margin-top:36px;text-align:center;padding:18px;border-top:1px solid var(--bd);font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--tx2);letter-spacing:.15em;text-transform:uppercase}
</style>
</head>
<body>
<div class="layout">
  <!-- Header -->
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:14px">
      <div class="logo-box">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <div>
        <div class="logo-text">ToneTurbo <span>Pro</span></div>
        <div class="sub">管理階層語調分析系統</div>
      </div>
    </div>
    <div id="proc-badge" style="display:none" class="proc-badge">
      <div style="width:14px;height:14px;border:2px solid var(--s2);border-top-color:var(--a2);border-radius:50%" class="spin"></div>
      <span class="mono" style="font-size:10px;color:var(--a2);font-weight:700;letter-spacing:.08em" id="proc-text">PROCESSING</span>
    </div>
  </div>

  <div class="grid">
    <!-- Left Panel -->
    <div class="col">
      <!-- API Key -->
      <div class="api-bar off" id="api-bar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--lit)" stroke-width="2.5" id="api-icon"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
        <div style="flex:1;min-width:0">
          <div style="font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;color:var(--lit)" id="api-label">Gemini AI 二次分析 ○ 未設定</div>
          <div style="display:flex;gap:6px">
            <input type="password" id="api-key" placeholder="貼上 Gemini API Key..." style="flex:1;padding:5px 8px;font-size:11px;min-width:0">
            <button class="btn btn-ghost" onclick="toggleApiKey()" style="width:auto;padding:4px 8px;font-size:10px" id="api-toggle">顯示</button>
          </div>
        </div>
        <span id="ai-status"></span>
      </div>

      <!-- Exclusion Panel -->
      <div class="excl-panel" id="excl-panel">
        <button class="excl-hdr" onclick="toggleExcl()">
          <div style="display:flex;align-items:center;gap:8px">
            <span>🚫</span>
            <span style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--neu)">中性排除清單</span>
            <span id="excl-count" style="font-size:10px;background:rgba(100,116,139,.2);color:var(--neu);border-radius:10px;padding:1px 8px;font-weight:700"></span>
          </div>
          <span id="excl-arrow" style="color:var(--tx2);font-size:12px;transition:transform .2s">▼</span>
        </button>
        <div id="excl-body" style="display:none" class="excl-body">
          <div id="excl-cats"></div>
          <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--bd)">
            <div style="font-size:9px;font-weight:700;color:var(--tx2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px">新增自訂排除詞</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap">
              <input id="new-word" placeholder="輸入詞語或開頭..." style="flex:1;min-width:90px;padding:6px 10px;font-size:12px" onkeydown="if(event.key==='Enter')addExclusion()">
              <select id="new-type" style="padding:6px 8px;font-size:11px;width:auto">
                <option value="prefix">開頭符合</option>
                <option value="contains">包含詞語</option>
                <option value="exact">完整符合</option>
                <option value="regex">正規表示式</option>
              </select>
              <button class="btn btn-ghost" onclick="addExclusion()" style="width:auto;padding:6px 10px;font-size:11px">＋ 新增</button>
              <button class="btn btn-ghost" onclick="resetExclusions()" style="width:auto;padding:6px 8px;font-size:10px">重置</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Upload Card -->
      <div class="card" style="padding:18px">
        <div class="tab-bar">
          <button class="tab active" id="tab-batch" onclick="switchTab('batch')">批次上傳</button>
          <button class="tab" id="tab-manual" onclick="switchTab('manual')">手動貼上</button>
        </div>
        <div id="pane-batch">
          <label class="upload-zone" style="display:block;cursor:pointer">
            <input type="file" multiple accept=".txt" onchange="handleFiles(this)" style="display:none">
            <svg style="margin:0 auto 10px;color:var(--tx2);display:block" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
            <div style="font-size:11px;color:var(--tx2);font-weight:700;letter-spacing:.08em;text-transform:uppercase">點擊上傳 .txt 檔案</div>
          </label>
          <button class="btn btn-ghost" onclick="addTestSample()" style="width:100%;margin-top:10px">＋ 加入測試樣本</button>
        </div>
        <div id="pane-manual" style="display:none">
          <input id="m-name" placeholder="樣本 ID（如：2330）" style="margin-bottom:8px">
          <textarea id="m-text" placeholder="在此貼上逐字稿全文..."></textarea>
          <button class="btn btn-ghost" onclick="addManual()" style="width:100%;margin-top:8px">加入分析佇列</button>
        </div>
        <div id="prog-wrap" style="display:none">
          <div class="prog"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
          <div class="mono" style="font-size:9px;color:var(--tx2);text-align:right;margin-top:5px" id="prog-text">0/0</div>
        </div>
        <button class="btn btn-primary" style="margin-top:12px" id="run-btn" onclick="runBatch()" disabled>▶ 啟動批次分析</button>
      </div>

      <!-- Export Card -->
      <div class="card fade-in" id="export-card" style="display:none;padding:18px;border-color:rgba(124,58,237,.3)">
        <div style="font-size:9px;font-weight:700;color:var(--a2);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px">匯出報表</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <button class="btn btn-ghost" onclick="exportSummary()" style="text-align:left;padding:9px 13px">📊 摘要報表（每公司一行）</button>
          <button class="btn btn-ghost" onclick="exportDetail()" style="text-align:left;padding:9px 13px">📋 完整明細（含逐句分析）</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="card fade-in" id="stats-card" style="display:none;padding:18px">
        <div style="font-size:9px;font-weight:700;color:var(--tx2);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px">整體統計</div>
        <div class="stat-grid" id="stat-grid"></div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="col">
      <!-- Queue -->
      <div class="card" style="overflow:hidden">
        <div style="padding:12px 18px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center">
          <span class="mono" style="font-size:9px;font-weight:700;color:var(--tx2);letter-spacing:.12em;text-transform:uppercase">BATCH QUEUE (<span id="q-count">0</span>)</span>
          <div style="display:flex;gap:8px">
            <button class="btn btn-ghost" style="padding:3px 9px;font-size:9px" onclick="clearQueue()">清除佇列</button>
            <button class="btn btn-ghost" style="padding:3px 9px;font-size:9px" onclick="clearAll()">全部清除</button>
          </div>
        </div>
        <div class="scroll-box" style="max-height:150px;padding:10px 14px">
          <div id="queue-empty" class="empty" style="padding:20px">尚未加入任何樣本</div>
          <div id="queue-grid" class="queue-grid"></div>
        </div>
      </div>

      <!-- Results Table -->
      <div class="card" style="overflow:hidden">
        <div style="padding:12px 18px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center">
          <span class="mono" style="font-size:9px;font-weight:700;color:var(--a2);letter-spacing:.12em;text-transform:uppercase">EMPIRICAL RESULTS</span>
          <span class="mono" style="font-size:9px;color:var(--tx2)">COMPLETED: <span id="result-count">0</span></span>
        </div>
        <div class="scroll-box" style="max-height:500px">
          <div id="results-empty" class="empty">等待分析輸出...</div>
          <table id="results-table" style="display:none">
            <thead>
              <tr>
                <th>ID / Company</th>
                <th style="color:#818cf8">Tone_P</th>
                <th style="color:var(--pos)">Tone_Q</th>
                <th style="color:#fff">Tone_T</th>
                <th style="color:var(--pos)">正向</th>
                <th style="color:var(--neg)">負向</th>
                <th style="color:var(--lit)">爭議</th>
                <th style="color:var(--unc)">不確定</th>
                <th style="color:var(--neu)">排除</th>
                <th style="color:var(--tx2)">有效句</th>
                <th style="color:var(--a2)">AI</th>
                <th style="color:var(--a2)">明細</th>
              </tr>
            </thead>
            <tbody id="results-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <footer>ToneTurbo Pro · Standalone Edition · </footer>
</div>

<!-- Detail Modal -->
<div class="overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hdr">
      <div>
        <div style="font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">句子明細</div>
        <div style="font-size:18px;font-weight:900" id="modal-title"></div>
      </div>
      <button class="btn btn-ghost" onclick="closeModal()" style="width:auto">✕ 關閉</button>
    </div>
    <div class="filter-bar" id="modal-filters"></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>

let queue = [], results = [], exclusions = [...DEFAULT_EXCLUSIONS], processing = false, currentIdx = -1, detailResult = null, modalFilter = 'ALL';

// ── 排除判斷 ──────────────────────────────────────────────────────
function isNeutral(sent) {
  for (const ex of exclusions) {
    try {
      if (ex.type==='exact' && sent===ex.value) return true;
      if (ex.type==='prefix' && sent.startsWith(ex.value)) return true;
      if (ex.type==='contains' && sent.includes(ex.value)) return true;
      if (ex.type==='regex' && new RegExp(ex.value).test(sent)) return true;
    } catch(e){}
  }
  return false;
}

function matches(sent, dict) {
  return [...new Set(dict.filter(w => w && sent.includes(w)))];
}

function localCat(sent) {
  if (isNeutral(sent)) return 'NEUTRAL';
  // 優先檢查情緒詞
  const posCount = DICTS.POS.filter(w => sent.includes(w)).length;
  const negCount = DICTS.NEG.filter(w => sent.includes(w)).length;
  const litCount = DICTS.LIT.filter(w => sent.includes(w)).length;
  const uncCount = DICTS.UNC.filter(w => sent.includes(w)).length;
  if (posCount > 0 && posCount >= negCount && posCount >= litCount && posCount >= uncCount) return 'POS';
  if (negCount > 0 && negCount > posCount && negCount >= litCount && negCount >= uncCount) return 'NEG';
  if (litCount > 0 && litCount > posCount && litCount > negCount && litCount >= uncCount) return 'LIT';
  if (uncCount > 0 && uncCount > posCount && uncCount > negCount && uncCount > litCount) return 'UNC';
  return 'NONE';
}

// 管理層職稱關鍵字（純職稱，不含姓名）
const MGMT_TITLES = /總經理|執行長|CEO|CFO|COO|CTO|副總|董事長|董事|首席|主管|協理|經理|財務長|發言人|副發言人|管理層|會計主管|業務|資深/;
// 非管理層關鍵字
const NON_MGMT_TITLES = /Investor\s*Relation|IR|主持人|司儀|媒體|分析師|投資人|記者|聽眾|研究員|主持|座談|法說|證券|投顧/;

function getRole(sent, lastRole) {
  // 1. 優先解析 **姓名 - 公司, 職稱** 格式（最可靠）
  const labelPat = /\*\*[^*]+-[^*]+,\s*([^*]+)\*\*/;
  const labelMatch = sent.match(labelPat);
  if (labelMatch) {
    const title = labelMatch[1].trim();
    if (MGMT_TITLES.test(title)) return 1;
    if (NON_MGMT_TITLES.test(title)) return 0;
  }

  // 2. 解析 **職稱** 單獨格式
  const boldPat = /\*\*([^*]+)\*\*/;
  const boldMatch = sent.match(boldPat);
  if (boldMatch) {
    const title = boldMatch[1].trim();
    if (MGMT_TITLES.test(title)) return 1;
    if (NON_MGMT_TITLES.test(title)) return 0;
  }

  // 3. 句子本身含明確職稱
  if (MGMT_TITLES.test(sent)) return 1;
  if (NON_MGMT_TITLES.test(sent)) return 0;

  // 4. 上下文保持（沿用前一句角色）
  if (lastRole !== null) return lastRole;

  // 5. 預設管理層
  return 1;
}

// getPhase 已移除：phase 由 ### Q&A 標記單向控制，見 processTranscript

function uncRefine(sent) {
  if (/(成長|擴張|增長|提升|擴大|發展|上升)/.test(sent)) return 1;
  if (/(風險|壓力|困難|不確定|危險|挑戰|下滑)/.test(sent)) return 2;
  return 0;
}

function calcTone(s) {
  const p = s.pos + s.pos_u, n = s.neg + s.neg_u, l = s.lit;
  const d = p + n + l;
  return d === 0 ? 0 : (p - n - l) / d;
}

async function processTranscript(text) {
  const qaStartPat = /^#{1,3}\s*(q&a|問答|問答環節|提問|analyst\s*q)/i;
  const startPat = /^#{1,3}\s*(transcript|逐字稿|q&a|問答環節)/i;
  const lines = text.split(/\n/);
  let startLine = 0;
  for (let i=0; i<lines.length; i++) {
    if (startPat.test(lines[i].trim())) { startLine = i+1; break; }
  }
  const trimmed = startLine > 0 ? lines.slice(startLine).join('\n') : text;
  const rawSents = trimmed.replace(/\[\d+:\d+:\d+\]|Page \d+ of \d+|\[\d+ 分鐘\]/gi,'')
    .split(/[。！？\n\r]/).map(s=>s.trim()).filter(s=>s.length>3 && !/^\d+$/.test(s));

  if (!rawSents.length) return empty();

  // Phase 判斷：遇到明確 Q&A 宣告就永久切換，不會再回到報告段
  const qaTextPat = /接下來是\s*(Q&A|問答|意見交換|提問時間)|進入\s*(Q&A|問答環節|提問環節|意見交換環節)|^開放提問|Q&A\s*(時間|環節|開始)|let.s begin the Q&A session|This concludes our key messages/i;
  let qaStarted = false;
  const phases = rawSents.map(s => {
    if (!qaStarted && (qaStartPat.test(s.trim()) || qaTextPat.test(s))) {
      qaStarted = true;
    }
    return qaStarted ? 1 : 0;
  });

  let roleCtx = 1;
  const roles = rawSents.map(s => {
    const ex = getRole(s, null); // 先不加上下文
    if (ex !== null) {
      roleCtx = ex;
      return ex;
    }
    return null; // 模糊
  });

  // 第二次 pass：加入上下文
  for (let i = 0; i < rawSents.length; i++) {
    if (roles[i] === null) {
      const lastRole = i > 0 ? roles[i-1] : null;
      const ex = getRole(rawSents[i], lastRole);
      if (ex !== null) {
        roles[i] = ex;
        roleCtx = ex;
      }
    }
    if (phases[i] === null) {
      const lastPhase = i > 0 ? phases[i-1] : null;
      const ep = getPhase(rawSents[i], lastPhase);
      if (ep !== null) {
        phases[i] = ep;
        phaseCtx = ep;
      }
    }
  }

  // 收集模糊句
  const unclearRoles = [], unclearPhases = [];
  rawSents.forEach((sent, i) => {
    if (roles[i] === null) unclearRoles.push({idx: i, sent});
    if (phases[i] === null) unclearPhases.push({idx: i, sent});
  });

  // 如果有模糊句，呼叫 AI
  if (unclearRoles.length || unclearPhases.length) {
    const apiKey = document.getElementById('api-key').value.trim();
    const allUnclearCount = unclearRoles.length + unclearPhases.length;
    if (apiKey.length > 10 && allUnclearCount <= 20) {
      setAiStatus('running');
      const aiRes = await geminiClassify(unclearRoles, unclearPhases, apiKey);
      aiRes.roles.forEach((r, j) => roles[unclearRoles[j].idx] = r);
      aiRes.phases.forEach((p, j) => phases[unclearPhases[j].idx] = p);
      setAiStatus('done');
    } else {
      // 沒有 AI 或太多模糊句，用預設
      unclearRoles.forEach(u => roles[u.idx] = roleCtx);
      unclearPhases.forEach(u => phases[u.idx] = phaseCtx);
    }
  }

  const stats = {
    P:{pos:0,pos_u:0,neg:0,neg_u:0,lit:0,unc:0,total:0,neutral:0},
    Q:{pos:0,pos_u:0,neg:0,neg_u:0,lit:0,unc:0,total:0,neutral:0}
  };
  const details = [], uncIndices = [];

  rawSents.forEach((sent, i) => {
    const cat = localCat(sent);
    const ref = uncRefine(sent);
    const key = phases[i]===0 ? 'P' : 'Q';
    const role = roles[i];
    if (role===1) {
      if (cat==='NEUTRAL') { stats[key].neutral++; }
      else {
        stats[key].total++;
        if (cat==='UNC') {
          stats[key].unc++;
          if (ref===1) stats[key].pos_u++;
          else if (ref===2) stats[key].neg_u++;
          uncIndices.push({detailIdx:details.length, key});
        } else if (cat!=='NONE') {
          const k = cat.toLowerCase();
          if (stats[key][k]!==undefined) stats[key][k]++;
        }
      }
    }
    details.push({
      sentence:sent, role, phase:phases[i], localCat:cat, refine:ref, aiRefined:false,
      posWords:matches(sent,DICTS.POS).join('，'),
      negWords:matches(sent,DICTS.NEG).join('，'),
      litWords:matches(sent,DICTS.LIT).join('，'),
      uncWords:matches(sent,DICTS.UNC).join('，'),
    });
  });

  const merged = {pos:stats.P.pos+stats.Q.pos,pos_u:stats.P.pos_u+stats.Q.pos_u,neg:stats.P.neg+stats.Q.neg,neg_u:stats.P.neg_u+stats.Q.neg_u,lit:stats.P.lit+stats.Q.lit};
  return {Tone_P:calcTone(stats.P),Tone_Q:calcTone(stats.Q),Tone_T:calcTone(merged),counts:stats,details,uncIndices};
}

function empty() {
  const s={pos:0,pos_u:0,neg:0,neg_u:0,lit:0,unc:0,total:0,neutral:0};
  return {Tone_P:0,Tone_Q:0,Tone_T:0,counts:{P:{...s},Q:{...s}},details:[],uncIndices:[]};
}

// ── Gemini AI ──────────────────────────────────────────────────────
const GMINI_PROMPT = `你是一位財務語言學專家。請判斷以下被字典法列為「不確定(UNC)」的句子。
- 若語氣偏向成長、樂觀、擴張、正面展望 → 回傳 1
- 若語氣偏向風險、壓力、困難、負面警示 → 回傳 2
- 若維持中立無法判斷 → 回傳 0
請嚴格以JSON陣列格式回傳，例如：[1, 0, 2]，長度必須與輸入句子數相同，不得有任何其他文字。`;

const CLASSIFY_PROMPT = `請判斷以下句子在法人說明會逐字稿中的角色與階段。

回傳 JSON 陣列：[{"role":1,"phase":0}, {"role":0,"phase":1}]，長度必須與句子數相同。

句子：
`;

async function geminiClassify(unclearRoles, unclearPhases, apiKey) {
  const allUnclear = [];
  unclearRoles.forEach(u => allUnclear.push(u.sent));
  unclearPhases.forEach(u => allUnclear.push(u.sent));
  if (!allUnclear.length) return {roles: [], phases: []};
  const msg = allUnclear.map((s,j)=>`${j+1}. ${s}`).join('\n');
  // 單次呼叫，減少延遲
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        contents: [{parts: [{text: msg}]}],
        systemInstruction: {parts: [{text: CLASSIFY_PROMPT}]},
        generationConfig: {temperature: 0, maxOutputTokens: 1000, responseMimeType: 'application/json'}
      })
    });
    if (!res.ok) throw new Error('API error');
    const d = await res.json();
    const raw = d.candidates?.[0]?.content?.parts?.[0]?.text || '[]';
    const arr = JSON.parse(raw.replace(/```json|```/g, '').trim());
    const roles = arr.slice(0, unclearRoles.length).map(o => o?.role ?? 1);
    const phases = arr.slice(unclearRoles.length).map(o => o?.phase ?? 0);
    return {roles, phases};
  } catch (e) {
    return {roles: unclearRoles.map(() => 1), phases: unclearPhases.map(() => 0)};
  }
}

async function geminiRefine(sents, apiKey) {
  if (!sents.length || !apiKey) return sents.map(()=>0);
  const CHUNK=20; const results=[];
  for (let i=0; i<sents.length; i+=CHUNK) {
    const chunk=sents.slice(i,i+CHUNK);
    const msg=chunk.map((s,j)=>`${j+1}. ${s}`).join('\n');
    let delay=1000, ok=false;
    for (let r=0; r<4; r++) {
      try {
        const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({contents:[{parts:[{text:msg}]}],systemInstruction:{parts:[{text:GMINI_PROMPT}]},generationConfig:{temperature:0,maxOutputTokens:300,responseMimeType:'application/json'}})
        });
        if (res.status===429||res.status>=500){await sleep(delay);delay*=1.8;continue;}
        if (!res.ok){results.push(...chunk.map(()=>0));ok=true;break;}
        const d=await res.json();
        const raw=d.candidates?.[0]?.content?.parts?.[0]?.text||'[]';
        const arr=JSON.parse(raw.replace(/```json|```/g,'').trim());
        results.push(...arr.map(v=>[0,1,2].includes(v)?v:0));
        ok=true; break;
      } catch(e){
        if(r===3) results.push(...chunk.map(()=>0));
        else await sleep(delay); delay*=1.8;
      }
    }
    if(!ok) results.push(...chunk.map(()=>0));
    if(i+CHUNK<sents.length) await sleep(500);
  }
  return results;
}

async function applyAI(metrics) {
  const {details,uncIndices,counts} = metrics;
  if (!uncIndices.length) return metrics;
  const apiKey = document.getElementById('api-key').value.trim();
  const sents = uncIndices.map(u=>details[u.detailIdx].sentence);
  setAiStatus('running');
  let aiRes;
  try { aiRes = await geminiRefine(sents, apiKey); setAiStatus('done'); }
  catch(e) { setAiStatus('error'); return metrics; }
  const nc = {P:{...counts.P,pos_u:0,neg_u:0},Q:{...counts.Q,pos_u:0,neg_u:0}};
  uncIndices.forEach((u,i)=>{
    const v=aiRes[i]??0;
    details[u.detailIdx].refine=v; details[u.detailIdx].aiRefined=true;
    if(v===1) nc[u.key].pos_u++;
    else if(v===2) nc[u.key].neg_u++;
  });
  const m={pos:nc.P.pos+nc.Q.pos,pos_u:nc.P.pos_u+nc.Q.pos_u,neg:nc.P.neg+nc.Q.neg,neg_u:nc.P.neg_u+nc.Q.neg_u,lit:nc.P.lit+nc.Q.lit};
  return {...metrics,counts:nc,Tone_P:calcTone(nc.P),Tone_Q:calcTone(nc.Q),Tone_T:calcTone(m),aiUsed:true};
}

  const n=document.getElementById('m-name').value.trim();
  const t=document.getElementById('m-text').value.trim();
  if(!n||!t) return;
  queue.push({name:n,type:'text',content:t,status:'pending'});
  document.getElementById('m-name').value='';
  document.getElementById('m-text').value='';
  renderQueue();
}
function addTestSample(){
  queue.push({name:'測試樣本',type:'text',content:'各位投資先進，大家午安。歡迎參加本次法人說明會。管理層表示，公司今年業績成長顯著，獲利創歷史新高。分析師詢問風險問題。董事長回應，我們有充分準備應對不確定性。謝謝各位的聆聽，謝謝。',status:'pending'});
  renderQueue();
}
function clearQueue(){queue=[];renderQueue();}
function clearAll(){queue=[];results=[];currentIdx=-1;renderQueue();renderResults();}

// ── Run ────────────────────────────────────────────────────────────
async function runBatch(){
  if(processing||!queue.length) return;
  processing=true;
  document.getElementById('proc-badge').style.display='flex';
  document.getElementById('run-btn').disabled=true;
  setAiStatus('');
  const apiKey=document.getElementById('api-key').value.trim();
  const aiOn=apiKey.length>10;

  for(let i=0;i<queue.length;i++){
    if(queue[i].status==='done') continue;
    currentIdx=i;
    document.getElementById('proc-text').textContent=`PROCESSING ${i+1}/${queue.length}`;
    renderQueue();
    try{
      let text;
      if(queue[i].type==='file'){
        try{text=await queue[i].content.text();}
        catch{const buf=await queue[i].content.arrayBuffer();text=new TextDecoder('big5').decode(buf);}
      } else text=queue[i].content;
      let m=await processTranscript(text);
      if(aiOn&&m.uncIndices.length>0) m=await applyAI(m);
      results.push({name:queue[i].name,...m});
      queue[i].status='done';
    }catch(e){queue[i].status='error';}
    renderQueue();
    renderResults();
    await sleep(30);
  }
  processing=false; currentIdx=-1;
  document.getElementById('proc-badge').style.display='none';
  document.getElementById('run-btn').disabled=false;
  renderQueue();
}

// ── Results Table ──────────────────────────────────────────────────
function renderResults(){
  const empty=document.getElementById('results-empty');
  const tbl=document.getElementById('results-table');
  const body=document.getElementById('results-body');
  document.getElementById('result-count').textContent=results.length;
  if(!results.length){empty.style.display='block';tbl.style.display='none';return;}
  empty.style.display='none'; tbl.style.display='table';
  body.innerHTML=results.map((r,i)=>{
    const tp=r.counts.P.pos+r.counts.P.pos_u+r.counts.Q.pos+r.counts.Q.pos_u;
    const tn=r.counts.P.neg+r.counts.P.neg_u+r.counts.Q.neg+r.counts.Q.neg_u;
    const tl=r.counts.P.lit+r.counts.Q.lit;
    const tu=r.counts.P.unc+r.counts.Q.unc;
    const tneu=(r.counts.P.neutral||0)+(r.counts.Q.neutral||0);
    const ts=r.counts.P.total+r.counts.Q.total;
    const tc=toneColor(r.Tone_T);
    return `<tr class="fade-in">
      <td style="font-weight:700;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.name}</td>
      <td class="mono" style="color:${toneColor(r.Tone_P)}">${r.Tone_P.toFixed(4)}</td>
      <td class="mono" style="color:${toneColor(r.Tone_Q)}">${r.Tone_Q.toFixed(4)}</td>
      <td><span class="mono" style="font-weight:700;color:${tc}">${r.Tone_T.toFixed(4)}</span>${toneBar(r.Tone_T,tc)}</td>
      <td class="mono" style="color:var(--pos)">${tp}</td>
      <td class="mono" style="color:var(--neg)">${tn}</td>
      <td class="mono" style="color:var(--lit)">${tl}</td>
      <td class="mono" style="color:var(--unc)">${tu}</td>
      <td class="mono" style="color:var(--neu)">${tneu}</td>
      <td class="mono" style="color:var(--tx2)">${ts}</td>
      <td>${r.aiUsed?'<span class="b-ai-on">✓ AI</span>':'<span class="b-ai-off">字典</span>'}</td>
      <td><button class="view-btn" onclick="openModal(${i})">查看 →</button></td>
    </tr>`;
  }).join('');
  // stats
  document.getElementById('export-card').style.display='block';
  document.getElementById('stats-card').style.display='block';
  const avg=(results.reduce((s,r)=>s+r.Tone_T,0)/results.length).toFixed(3);
  document.getElementById('stat-grid').innerHTML=`
    <div class="stat"><div class="stat-n" style="color:var(--pos)">${results.length}</div><div class="stat-l">已分析樣本</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--a2)">${avg}</div><div class="stat-l">平均 Tone_T</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--pos)">${results.filter(r=>r.Tone_T>0).length}</div><div class="stat-l">正向樣本數</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--neg)">${results.filter(r=>r.Tone_T<0).length}</div><div class="stat-l">負向樣本數</div></div>`;
}

// ── Detail Modal ───────────────────────────────────────────────────
const CAT_LABEL={POS:'正向',NEG:'負向',LIT:'法律',UNC:'不確定',NEUTRAL:'中性排除',NONE:'無命中'};
const CAT_CLS={POS:'b-pos',NEG:'b-neg',LIT:'b-lit',UNC:'b-unc',NEUTRAL:'b-neu',NONE:'b-none'};

function openModal(idx){
  detailResult=results[idx];
  modalFilter='ALL';
  document.getElementById('modal-title').textContent=detailResult.name;
  renderModal();
  document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none';}

function renderModal(){
  const d=detailResult;
  const cats=['ALL','POS','NEG','LIT','UNC','NEUTRAL','NONE'];
  const counts={};
  cats.forEach(c=>{counts[c]=c==='ALL'?d.details.length:d.details.filter(x=>x.localCat===c).length;});
  document.getElementById('modal-filters').innerHTML=cats.map(c=>`
    <button class="filt-btn${modalFilter===c?' active':''}" onclick="setFilter('${c}')">
      ${c==='ALL'?`全部 (${counts[c]})`:CAT_LABEL[c]+` (${counts[c]})`}
    </button>`).join('');
  const filtered=modalFilter==='ALL'?d.details:d.details.filter(x=>x.localCat===modalFilter);
  document.getElementById('modal-body').innerHTML=filtered.length?filtered.map(row=>{
    const chips=[
      ...row.posWords.split('，').filter(Boolean).map(w=>`<span class="chip cp-pos">+${w}</span>`),
      ...row.negWords.split('，').filter(Boolean).map(w=>`<span class="chip cp-neg">−${w}</span>`),
      ...row.litWords.split('，').filter(Boolean).map(w=>`<span class="chip cp-lit">§${w}</span>`),
      ...row.uncWords.split('，').filter(Boolean).map(w=>`<span class="chip cp-unc">?${w}</span>`),
    ].join('');
    const refBadge=row.refine>0&&row.localCat!=='NEUTRAL'?`<span class="badge" style="background:rgba(124,58,237,.2);color:var(--a2)">${row.refine===1?'▲ 修正正向':'▼ 修正負向'}${row.aiRefined?' (AI)':''}</span>`:'';
    return `<div class="s-card${row.localCat==='NEUTRAL'?' neutral':''}">
      <div class="s-meta">
        <span class="badge ${CAT_CLS[row.localCat]}">${CAT_LABEL[row.localCat]}</span>
        <span class="badge b-none">${row.role===1?'管理層':'非管理層'}</span>
        <span class="badge b-none">${row.phase===0?'報告段':'問答段'}</span>
        ${refBadge}
      </div>
      <div class="s-text${row.localCat==='NEUTRAL'?' dim':''}">${row.sentence}</div>
      ${chips?`<div class="chips">${chips}</div>`:''}
    </div>`;
  }).join(''):'<div style="text-align:center;color:var(--tx2);font-size:12px;padding:40px">無相符句子</div>';
}
function setFilter(f){modalFilter=f;renderModal();}

// ── Export ─────────────────────────────────────────────────────────
function exportSummary(){
  if(!results.length) return;
  const hdr='Company,Tone_P,Tone_Q,Tone_T,Pos_P,Neg_P,Lit_P,Unc_P,Neutral_P,Total_P,Pos_Q,Neg_Q,Lit_Q,Unc_Q,Neutral_Q,Total_Q\n';
  const rows=results.map(r=>{
    const{P,Q}=r.counts;
    return `${r.name},${r.Tone_P.toFixed(4)},${r.Tone_Q.toFixed(4)},${r.Tone_T.toFixed(4)},${P.pos+P.pos_u},${P.neg+P.neg_u},${P.lit},${P.unc},${P.neutral||0},${P.total},${Q.pos+Q.pos_u},${Q.neg+Q.neg_u},${Q.lit},${Q.unc},${Q.neutral||0},${Q.total}`;
  });
  dl('\uFEFF'+hdr+rows.join('\n'),'Tone_Summary.csv');
}
function exportDetail(){
  if(!results.length) return;
  const hdr='Company,Sentence,Role,Phase,LocalCat,Refine,AiRefined,PosWords,NegWords,LitWords,UncWords,Tone_P,Tone_Q,Tone_T\n';
  const rows=[];
  results.forEach(r=>{
    (r.details||[]).forEach(d=>{
      rows.push(`${r.name},"${(d.sentence||'').replace(/"/g,'""').replace(/\n/g,' ')}",${d.role},${d.phase},${d.localCat},${d.refine},${d.aiRefined?1:0},"${d.posWords}","${d.negWords}","${d.litWords}","${d.uncWords}",${r.Tone_P.toFixed(4)},${r.Tone_Q.toFixed(4)},${r.Tone_T.toFixed(4)}`);
    });
  });
  dl('\uFEFF'+hdr+rows.join('\n'),'Tone_Detail.csv');
}
function dl(content,filename){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type:'text/csv;charset=utf-8;'}));
  a.download=filename; a.click();
}

// ── Init ───────────────────────────────────────────────────────────
renderQueue();
renderResults();
document.getElementById('excl-count').textContent=exclusions.length+' 條規則';
</script>
