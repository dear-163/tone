<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToneTurbo Pro — 管理階層語調分析系統</title>
    <!-- ✅ 修復：改用 CDN，不再依賴本地檔案 -->
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #21262d;
            --border: #30363d;
            --accent: #7c3aed;
            --accent2: #a78bfa;
            --pos: #34d399;
            --neg: #f87171;
            --lit: #fb923c;
            --unc: #94a3b8;
            --text: #e6edf3;
            --text2: #8b949e;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
        }
        .mono { font-family: 'IBM Plex Mono', monospace; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        @keyframes spin { 0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);} }
        @keyframes fadeIn { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }
        @keyframes pulse-border { 0%,100%{border-color:#7c3aed;} 50%{border-color:#a78bfa;} }

        .spin { animation: spin 0.8s linear infinite; }
        .fade-in { animation: fadeIn 0.4s ease-out; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.15s;
            width: 100%;
        }
        .btn-primary:hover { background: #6d28d9; transform: translateY(-1px); }
        .btn-primary:disabled { background: var(--surface2); color: var(--text2); cursor: not-allowed; transform: none; }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text2);
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-ghost:hover { border-color: var(--accent2); color: var(--accent2); }

        .tab-bar { display: flex; background: var(--surface2); border-radius: 8px; padding: 3px; gap: 2px; }
        .tab { flex: 1; padding: 8px; border: none; background: transparent; color: var(--text2);
               border-radius: 6px; font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
               text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
        .tab.active { background: var(--accent); color: white; }

        input, textarea {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            font-family: 'Noto Sans TC', sans-serif;
            width: 100%;
            outline: none;
            transition: border-color 0.15s;
        }
        input:focus, textarea:focus { border-color: var(--accent2); }
        textarea { resize: vertical; min-height: 120px; }
        input::placeholder, textarea::placeholder { color: var(--text2); }

        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-zone:hover { border-color: var(--accent); background: rgba(124,58,237,0.05); }

        .queue-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
        }
        .queue-item.active { border-color: var(--accent); background: rgba(124,58,237,0.1); animation: pulse-border 1.5s infinite; }
        .queue-item.done { border-color: #34d399; }
        .queue-item.error { border-color: var(--neg); }

        .badge {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .badge-pos { background: rgba(52,211,153,0.15); color: var(--pos); }
        .badge-neg { background: rgba(248,113,113,0.15); color: var(--neg); }
        .badge-lit { background: rgba(251,146,60,0.15); color: var(--lit); }
        .badge-unc { background: rgba(148,163,184,0.15); color: var(--unc); }
        .badge-wait { background: var(--surface2); color: var(--text2); }

        .results-table { width: 100%; border-collapse: collapse; }
        .results-table th {
            background: var(--surface2);
            padding: 10px 14px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text2);
            text-align: left;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .results-table td {
            padding: 10px 14px;
            font-size: 12px;
            border-bottom: 1px solid rgba(48,54,61,0.5);
            vertical-align: middle;
        }
        .results-table tr:hover td { background: rgba(255,255,255,0.02); }

        .tone-bar-container { width: 80px; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; display: inline-block; vertical-align: middle; margin-left: 6px; }
        .tone-bar { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
        }

        .detail-modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: flex; align-items: center; justify-content: center;
            z-index: 100; padding: 20px;
        }
        .detail-modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 900px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.2s ease-out;
        }

        .progress-bar { height: 2px; background: var(--surface2); border-radius: 1px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s ease; }

        /* Scrollable areas */
        .scroll-area { overflow-y: auto; overflow-x: auto; }

        .word-chip { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; margin-right: 3px; margin-bottom: 3px; display: inline-block; }
        .chip-pos { background: rgba(52,211,153,0.12); border: 1px solid rgba(52,211,153,0.3); color: var(--pos); }
        .chip-neg { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3); color: var(--neg); }
        .chip-lit { background: rgba(251,146,60,0.12); border: 1px solid rgba(251,146,60,0.3); color: var(--lit); }
        .chip-unc { background: rgba(148,163,184,0.12); border: 1px solid rgba(148,163,184,0.3); color: var(--unc); }
            background: linear-gradient(135deg, var(--accent) 0%, #9d4edd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .api-key-bar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .api-key-bar.active { border-color: rgba(52,211,153,0.5); }
        .api-key-bar.inactive { border-color: rgba(251,146,60,0.4); }

        .ai-badge {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
            text-transform: uppercase; padding: 2px 7px; border-radius: 4px;
        }
        .ai-badge.on  { background: rgba(52,211,153,0.15); color: var(--pos); }
        .ai-badge.off { background: rgba(251,146,60,0.15); color: var(--lit); }
        .ai-badge.running { background: rgba(167,139,250,0.15); color: var(--accent2); }
    </style>
</head>

        const getWordMatches = (sent, dict) => {

        const getLocalCat = (sent) => {

            if (DICTS.LIT.some(w => sent.includes(w))) return "LIT";
            if (DICTS.UNC.some(w => sent.includes(w))) return "UNC";
            return "NONE";
        };

        const getPhase = (sent) => {
            // 明確問句標記（需要有冒號或特定格式）
            if (/(問[:：]|Q[:：]|請問|疑問)/.test(sent)) return 1;
            // 明確答句標記（需要有冒號，避免「說明會」「回覆信」等誤判）
            if (/(答[:：]|回答[:：]|回覆[:：]|回應[:：])/.test(sent)) return 1;

            if (/[？?]/.test(sent) && sent.length < 60) return 1;
            return 0;
        };

            if (/\*\*.*?(總經理|執行長|CEO|CFO|副總|董事長|首席|主管|協理|經理|財務|業務|消費|企業金融|財富|會計)\s*\*\*/.test(sent)) return 1;

            if (/(管理層|董事|總經理|執行長|CEO|CFO|副總|董事長|首席|主管|協理|經理)/.test(sent)) return 1;

        const getUncRefine = (sent) => {

        // ─── Gemini AI 二次分析（僅針對 UNC 句子）─────────────────────
        const GEMINI_SYSTEM_PROMPT = `你是一位財務語言學專家。請判斷以下被字典法列為「不確定 (UNC)」的句子。
- 若語氣偏向成長、樂觀、擴張、正面展望 → 回傳 1
- 若語氣偏向風險、壓力、困難、負面警示 → 回傳 2
- 若維持中立無法判斷 → 回傳 0
請嚴格以 JSON 陣列格式回傳，例如：[1, 0, 2]，長度必須與輸入句子數相同，不得有任何其他文字。`;

        const geminiRefineUNC = async (uncSentences, apiKey) => {
            if (!uncSentences.length || !apiKey) return uncSentences.map(() => 0);
            const CHUNK = 20;
            const results = [];
            for (let i = 0; i < uncSentences.length; i += CHUNK) {
                const chunk = uncSentences.slice(i, i + CHUNK);
                const userMsg = chunk.map((s, idx) => `${idx+1}. ${s}`).join('\n');
                let delay = 1000;
                let success = false;
                for (let retry = 0; retry < 4; retry++) {
                    try {
                        const res = await fetch(
                            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
                            {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    contents: [{ parts: [{ text: userMsg }] }],
                                    systemInstruction: { parts: [{ text: GEMINI_SYSTEM_PROMPT }] },
                                    generationConfig: { temperature: 0, maxOutputTokens: 300, responseMimeType: 'application/json' }
                                })
                            }
                        );
                        if (res.status === 429 || res.status >= 500) {
                            await new Promise(r => setTimeout(r, delay));
                            delay *= 1.8;
                            continue;
                        }
                        if (!res.ok) { results.push(...chunk.map(() => 0)); success = true; break; }
                        const data = await res.json();
                        const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '[]';
                        const arr = JSON.parse(raw.replace(/```json|```/g, '').trim());
                        results.push(...arr.map(v => [0,1,2].includes(v) ? v : 0));
                        success = true;
                        break;
                    } catch(e) {
                        if (retry === 3) results.push(...chunk.map(() => 0));
                        else await new Promise(r => setTimeout(r, delay));
                        delay *= 1.8;
                    }
                }
                if (!success) results.push(...chunk.map(() => 0));
                if (i + CHUNK < uncSentences.length) await new Promise(r => setTimeout(r, 500));
            }
            return results;

        const processTranscript = (text) => {
            // 找到 ## Transcript 標記，之前的內容全部標注為 role=0 不計入
            const transcriptStartPattern = /^#{1,3}\s*(transcript|逐字稿|q&a|問答環節)/i;
            const lines = text.split(/\n/);
            let startLine = 0;
            for (let i = 0; i < lines.length; i++) {

            const phaseList = rawSents.map(sent => {
                if (qaStartPattern.test(sent.trim())) { qaStarted = true; return 1; }
                // 有 ## Q&A 標記的文件：標記前全部報告段，標記後全部問答段
                if (hasQAMarker) return qaStarted ? 1 : 0;
                // 沒有標記的文件：用 getPhase 規則判斷
                const ep = getPhase(sent);

            // 預設從 1 開始（報告段通常是管理層發言），遇到非管理層標記才切換為 0

            const uncIndices = []; // {detailIdx, key}

                const posWords = getWordMatches(sent, DICTS.POS);
                const negWords = getWordMatches(sent, DICTS.NEG);
                const litWords = getWordMatches(sent, DICTS.LIT);
                const uncWords = getWordMatches(sent, DICTS.UNC);
                const localCat = getLocalCat(sent);
                const refine = getUncRefine(sent);
                const phase = phaseList[idx];
                const role = roleList[idx];
                const key = phase === 0 ? 'P' : 'Q';

                if (role === 1) {
                    stats[key].total++;
                    if (localCat === "UNC") {
                        stats[key].unc++;
                        if (refine === 1) stats[key].pos_u++;
                        else if (refine === 2) stats[key].neg_u++;
                        uncIndices.push({ detailIdx: detailRows.length, key }); // 記錄位置
                    } else if (localCat !== "NONE") {
                        const lower = localCat.toLowerCase();
                        if (stats[key][lower] !== undefined) stats[key][lower]++;
                    }

                const row = { sentence: sent, role, phase, localCat, refine, posWords: posWords.join('，'), negWords: negWords.join('，'), litWords: litWords.join('，'), uncWords: uncWords.join('，') };
                detailRows.push(row);
                if (role === 1 && phase === 1) managerQADetails.push(row);
            });

            const calcTone = (s) => {
                const p = s.pos + s.pos_u, n = s.neg + s.neg_u, l = s.lit;
                const den = p + n + l;
                return den === 0 ? 0 : (p - n - l) / den;

            const toneP = calcTone(stats.P);
            const toneQ = calcTone(stats.Q);
            const merged = {
                pos: stats.P.pos + stats.Q.pos, pos_u: stats.P.pos_u + stats.Q.pos_u,
                neg: stats.P.neg + stats.Q.neg, neg_u: stats.P.neg_u + stats.Q.neg_u,
                lit: stats.P.lit + stats.Q.lit

                        <div className="scroll-area" style={{flex:1, padding:'16px 24px'}}>
                            {filtered.length === 0 ? (
                                <p style={{textAlign:'center',color:'var(--text2)',fontSize:'12px',padding:'40px'}}>無相符句子</p>
                            ) : filtered.map((d, i) => (
                                <div key={i} style={{marginBottom:'10px', padding:'12px', background:'var(--surface2)', borderRadius:'8px', border:'1px solid var(--border)'}}>
                                    <div style={{display:'flex',gap:'6px',marginBottom:'6px',flexWrap:'wrap',alignItems:'center'}}>
                                        <span className={`badge ${catColor[d.localCat]}`}>{catLabel[d.localCat]}</span>
                                        <span className="badge" style={{background:'var(--surface)',color:'var(--text2)'}}>{d.role===1?'管理層':'非管理層'}</span>
                                        <span className="badge" style={{background:'var(--surface)',color:'var(--text2)'}}>{d.phase===0?'報告段':'問答段'}</span>
                                        {d.refine>0 && <span className="badge" style={{background:'rgba(124,58,237,0.2)',color:'var(--accent2)'}}>{d.refine===1?'▲ 修正正向':'▼ 修正負向'}{d.aiRefined?' (AI)':''}</span>}
                                    </div>
                                    <p style={{fontSize:'13px',lineHeight:'1.6',margin:'0 0 8px',color:'var(--text)'}}>{d.sentence}</p>
                                    {(d.posWords || d.negWords || d.litWords || d.uncWords) && (
                                        <div style={{marginTop:'8px',paddingTop:'8px',borderTop:'1px solid var(--border)',display:'flex',flexWrap:'wrap',gap:'2px'}}>
                                            {d.posWords && d.posWords.split('，').filter(Boolean).map((w,i) => <span key={i} className="word-chip chip-pos">+{w}</span>)}
                                            {d.negWords && d.negWords.split('，').filter(Boolean).map((w,i) => <span key={i} className="word-chip chip-neg">−{w}</span>)}
                                            {d.litWords && d.litWords.split('，').filter(Boolean).map((w,i) => <span key={i} className="word-chip chip-lit">§{w}</span>)}
                                            {d.uncWords && d.uncWords.split('，').filter(Boolean).map((w,i) => <span key={i} className="word-chip chip-unc">?{w}</span>)}
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // ─── Main App ──────────────────────────────────────────────────
        const App = () => {
            const [batchList, setBatchList] = useState([]);
            const [mode, setMode] = useState('batch');
            const [manualText, setManualText] = useState('');
            const [manualName, setManualName] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);
            const [currentIndex, setCurrentIndex] = useState(-1);
            const [results, setResults] = useState([]);
            const [detailTarget, setDetailTarget] = useState(null);
            const [geminiApiKey, setGeminiApiKey] = useState('');
            const [showApiKey, setShowApiKey] = useState(false);
            const [aiStatus, setAiStatus] = useState('idle'); // idle | running | done | error

            const progress = batchList.length > 0 ? (batchList.filter(i=>i.status==='done').length / batchList.length) * 100 : 0;
            const aiEnabled = geminiApiKey.trim().length > 10;

            // AI 修正函數：拿到字典法結果後，送 UNC 句子給 Gemini，更新 counts 與 Tone
            const applyAIRefinement = async (metrics) => {
                const { details, uncIndices, counts } = metrics;
                if (!uncIndices.length) return metrics;

                const uncSents = uncIndices.map(u => details[u.detailIdx].sentence);
                const aiResults = await geminiRefineUNC(uncSents, geminiApiKey.trim());

                // 重置 pos_u / neg_u，重新計算
                const newCounts = {
                    P: { ...counts.P, pos_u: 0, neg_u: 0 },
                    Q: { ...counts.Q, pos_u: 0, neg_u: 0 }
                };

                uncIndices.forEach((u, i) => {
                    const aiVal = aiResults[i] ?? 0;
                    const row = details[u.detailIdx];
                    // 更新 row 的 refine（供明細顯示用）
                    row.refine = aiVal;
                    row.aiRefined = true;
                    if (aiVal === 1) newCounts[u.key].pos_u++;
                    else if (aiVal === 2) newCounts[u.key].neg_u++;
                });

                const calcTone = (s) => {
                    const p = s.pos + s.pos_u, n = s.neg + s.neg_u, l = s.lit;
                    const den = p + n + l;
                    return den === 0 ? 0 : (p - n - l) / den;
                };
                const merged = {
                    pos: newCounts.P.pos + newCounts.Q.pos, pos_u: newCounts.P.pos_u + newCounts.Q.pos_u,
                    neg: newCounts.P.neg + newCounts.Q.neg, neg_u: newCounts.P.neg_u + newCounts.Q.neg_u,
                    lit: newCounts.P.lit + newCounts.Q.lit
                };
                return { ...metrics, counts: newCounts, Tone_P: calcTone(newCounts.P), Tone_Q: calcTone(newCounts.Q), Tone_T: calcTone(merged), aiUsed: true };
            };

            const handleFileUpload = (e) => {
                const files = Array.from(e.target.files);
                const newList = files.map(f => ({ name: f.name.replace(/\.txt$/i,''), type:'file', content:f, status:'pending' }));
                setBatchList(prev => [...prev, ...newList]);
            };

            const addManualToQueue = () => {
                if (!manualText.trim() || !manualName.trim()) return;
                setBatchList(prev => [...prev, { name:manualName, type:'text', content:manualText, status:'pending' }]);
                setManualText(''); setManualName('');
            };

            const addTestSample = () => {
                const testText = `管理層表示，公司今年業績成長顯著，獲利創歷史新高。投資人詢問風險問題。董事長回應，我們有充分準備應對不確定性。分析師質疑市場波動性。總經理強調創新策略與擴張計畫。CFO說明財務穩健，確保股東收益。`;
                setBatchList(prev => [...prev, { name:'測試樣本', type:'text', content:testText, status:'pending' }]);
            };

            const clearAll = () => {
                setBatchList([]); setResults([]); setCurrentIndex(-1);
            };

            const runBatch = async () => {
                setIsProcessing(true);
                setAiStatus('idle');
                for (let i = 0; i < batchList.length; i++) {
                    if (batchList[i].status === 'done') continue;
                    setCurrentIndex(i);
                    try {
                        let text;
                        if (batchList[i].type === 'file') {
                            try { text = await batchList[i].content.text(); }
                            catch {
                                const buf = await batchList[i].content.arrayBuffer();
                                text = new TextDecoder('big5').decode(buf);
                            }
                        } else {
                            text = batchList[i].content;
                        }
                        let metrics = processTranscript(text);

                        // AI 二次分析（若有填入 API Key）
                        if (aiEnabled && metrics.uncIndices.length > 0) {
                            setAiStatus('running');
                            try {
                                metrics = await applyAIRefinement(metrics);
                                setAiStatus('done');
                            } catch(aiErr) {
                                console.warn('AI 分析失敗，使用字典法結果:', aiErr);
                                setAiStatus('error');
                            }
                        }

                        setResults(prev => [...prev, { name: batchList[i].name, ...metrics }]);
                        setBatchList(prev => prev.map((item, idx) => idx===i ? {...item, status:'done'} : item));
                    } catch(e) {
                        console.error(e);
                        setBatchList(prev => prev.map((item, idx) => idx===i ? {...item, status:'error'} : item));
                    }
                    await new Promise(r => setTimeout(r, 50));
                }
                setIsProcessing(false);
                setCurrentIndex(-1);
            };

            const exportCSV = () => {
                if (results.length === 0) return;
                const header = "Company,Sentence,Role,Phase,LocalCat,Refine,PosWords,NegWords,LitWords,UncWords,Tone_P,Tone_Q,Tone_T,PosTotal,NegTotal,Lit,Unc,TotalSent\n";
                const rows = [], managerQARows = [];
                results.forEach(r => {
                    const tp = r.counts.P.pos + r.counts.P.pos_u + r.counts.Q.pos + r.counts.Q.pos_u;
                    const tn = r.counts.P.neg + r.counts.P.neg_u + r.counts.Q.neg + r.counts.Q.neg_u;
                    const tl = r.counts.P.lit + r.counts.Q.lit;
                    const tu = r.counts.P.unc + r.counts.Q.unc;
                    const ts = r.counts.P.total + r.counts.Q.total;
                    if (r.details && r.details.length) {
                        r.details.forEach(d => {
                            const row = `${r.name},"${(d.sentence||'').replace(/"/g,'""').replace(/\n/g,' ')}",${d.role},${d.phase},${d.localCat},${d.refine},"${d.posWords}","${d.negWords}","${d.litWords}","${d.uncWords}",${r.Tone_P.toFixed(4)},${r.Tone_Q.toFixed(4)},${r.Tone_T.toFixed(4)},${tp},${tn},${tl},${tu},${ts}`;
                            rows.push(row);
                            if (d.role===1 && d.phase===1) managerQARows.push(row);
                        });
                    }
                });
                const dl = (content, filename) => {
                    const blob = new Blob(["\uFEFF"+content], {type:'text/csv;charset=utf-8;'});
                    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
                };
                dl(header + rows.join('\n'), 'Tone_Research_Results.csv');
                if (managerQARows.length > 0) dl(header + managerQARows.join('\n'), 'Tone_ManagerQA_Results.csv');
            };

            // 新增：匯出摘要 CSV
            const exportSummaryCSV = () => {
                if (results.length === 0) return;
                const header = "Company,Tone_P,Tone_Q,Tone_T,Pos_P,Neg_P,Lit_P,Unc_P,Total_P,Pos_Q,Neg_Q,Lit_Q,Unc_Q,Total_Q\n";
                const rows = results.map(r => {
                    const {P,Q} = r.counts;
                    return `${r.name},${r.Tone_P.toFixed(4)},${r.Tone_Q.toFixed(4)},${r.Tone_T.toFixed(4)},${P.pos+P.pos_u},${P.neg+P.neg_u},${P.lit},${P.unc},${P.total},${Q.pos+Q.pos_u},${Q.neg+Q.neg_u},${Q.lit},${Q.unc},${Q.total}`;
                });
                const blob = new Blob(["\uFEFF"+header+rows.join('\n')], {type:'text/csv;charset=utf-8;'});
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'Tone_Summary.csv'; a.click();
            };

            const getToneColor = (v) => {
                if (v > 0.1) return 'var(--pos)';
                if (v < -0.1) return 'var(--neg)';
                return 'var(--unc)';
            };

            const getToneBarWidth = (v) => Math.min(100, Math.abs(v) * 100) + '%';

            return (
                <div style={{maxWidth:'1280px', margin:'0 auto', padding:'24px 20px'}}>
                    {/* Header */}
                    <header style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'32px'}}>
                        <div style={{display:'flex', alignItems:'center', gap:'14px'}}>
                            <div style={{background:'linear-gradient(135deg,#7c3aed,#9d4edd)', padding:'10px', borderRadius:'12px', display:'flex', alignItems:'center', justifyContent:'center'}}>
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                            </div>
                            <div>
                                <h1 className="mono" style={{fontSize:'20px',fontWeight:'700',margin:0,color:'var(--text)'}}>ToneTurbo <span className="header-glow">Pro</span></h1>
                                <p style={{fontSize:'9px',fontWeight:'700',color:'var(--text2)',letterSpacing:'0.15em',textTransform:'uppercase',margin:'3px 0 0'}}>管理階層語調分析系統 · Zhang (2015) & Hao-Wang (2024)</p>
                            </div>
                        </div>
                        {isProcessing && (
                            <div style={{display:'flex',alignItems:'center',gap:'10px',background:'var(--surface)',border:'1px solid var(--accent)',borderRadius:'10px',padding:'8px 16px'}}>
                                <div style={{width:'14px',height:'14px',border:'2px solid var(--surface2)',borderTop:'2px solid var(--accent2)',borderRadius:'50%'}} className="spin"></div>
                                <span className="mono" style={{fontSize:'10px',color:'var(--accent2)',letterSpacing:'0.08em',fontWeight:'700'}}>PROCESSING {currentIndex+1}/{batchList.length}</span>
                            </div>
                        )}
                    </header>

                    <div style={{display:'grid', gridTemplateColumns:'340px 1fr', gap:'20px', alignItems:'start'}}>
                        {/* Left Panel */}
                        <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
                            {/* Gemini API Key Card */}
                            <div className={`api-key-bar ${aiEnabled ? 'active' : 'inactive'}`}>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={aiEnabled ? 'var(--pos)' : 'var(--lit)'} strokeWidth="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
                                <div style={{flex:1,minWidth:0}}>
                                    <p style={{fontSize:'8px',fontWeight:'700',color: aiEnabled ? 'var(--pos)' : 'var(--lit)',letterSpacing:'0.1em',textTransform:'uppercase',margin:'0 0 4px'}}>
                                        Gemini AI 二次分析 {aiEnabled ? '● 已啟用' : '○ 未設定'}
                                    </p>
                                    <div style={{display:'flex',gap:'6px'}}>
                                        <input
                                            type={showApiKey ? 'text' : 'password'}
                                            value={geminiApiKey}
                                            onChange={e => setGeminiApiKey(e.target.value)}
                                            placeholder="貼上 Gemini API Key..."
                                            style={{flex:1,padding:'5px 8px',fontSize:'11px',background:'var(--bg)',border:'1px solid var(--border)',color:'var(--text)',borderRadius:'6px',outline:'none',minWidth:0}}
                                        />
                                        <button onClick={() => setShowApiKey(v => !v)}
                                            style={{padding:'4px 8px',fontSize:'10px',background:'transparent',border:'1px solid var(--border)',color:'var(--text2)',borderRadius:'6px',cursor:'pointer',whiteSpace:'nowrap'}}>
                                            {showApiKey ? '隱藏' : '顯示'}
                                        </button>
                                    </div>
                                </div>
                                {aiStatus === 'running' && <span className="ai-badge running">AI 分析中</span>}
                                {aiStatus === 'done'    && <span className="ai-badge on">✓ 完成</span>}
                                {aiStatus === 'error'   && <span className="ai-badge off">！失敗</span>}
                            </div>

                            {/* Upload Card */}
                            <div className="card" style={{padding:'20px'}}>
                                <div className="tab-bar" style={{marginBottom:'16px'}}>
                                    <button className={`tab ${mode==='batch'?'active':''}`} onClick={() => setMode('batch')}>批次上傳</button>
                                    <button className={`tab ${mode==='manual'?'active':''}`} onClick={() => setMode('manual')}>手動貼上</button>
                                </div>
                                {mode === 'batch' ? (
                                    <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
                                        <label className="upload-zone">
                                            <input type="file" multiple accept=".txt" onChange={handleFileUpload} style={{display:'none'}}/>
                                            <svg style={{margin:'0 auto 10px',color:'var(--text2)',display:'block'}} width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                                            <p style={{fontSize:'11px',color:'var(--text2)',fontWeight:'700',letterSpacing:'0.08em',textTransform:'uppercase',margin:0}}>點擊上傳 .txt 檔案</p>
                                        </label>
                                        <button className="btn-ghost" onClick={addTestSample}>＋ 加入測試樣本</button>
                                    </div>
                                ) : (
                                    <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
                                        <input value={manualName} onChange={e=>setManualName(e.target.value)} placeholder="樣本 ID（如：2330）"/>
                                        <textarea value={manualText} onChange={e=>setManualText(e.target.value)} placeholder="在此貼上逐字稿全文..." style={{height:'120px'}}/>
                                        <button className="btn-ghost" onClick={addManualToQueue} disabled={!manualText.trim()||!manualName.trim()} style={{width:'100%'}}>加入分析佇列</button>
                                    </div>
                                )}
                                {batchList.length > 0 && (
                                    <div style={{marginTop:'12px'}}>
                                        <div className="progress-bar">
                                            <div className="progress-fill" style={{width: progress+'%'}}></div>
                                        </div>
                                        <p className="mono" style={{fontSize:'9px',color:'var(--text2)',marginTop:'6px',textAlign:'right'}}>{batchList.filter(i=>i.status==='done').length}/{batchList.length} 完成</p>
                                    </div>
                                )}
                                <button className="btn-primary" style={{marginTop:'14px'}} onClick={runBatch} disabled={isProcessing||batchList.length===0}>
                                    {isProcessing ? '分析中...' : '▶ 啟動批次分析'}
                                </button>
                            </div>

                            {/* Export Card */}
                            {results.length > 0 && (
                                <div className="card fade-in" style={{padding:'20px',borderColor:'rgba(124,58,237,0.3)'}}>
                                    <p style={{fontSize:'9px',fontWeight:'700',color:'var(--accent2)',letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:'12px'}}>匯出報表</p>
                                    <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
                                        <button className="btn-ghost" onClick={exportSummaryCSV} style={{width:'100%', textAlign:'left', padding:'10px 14px'}}>
                                            📊 摘要報表（每公司一行）
                                        </button>
                                        <button className="btn-ghost" onClick={exportCSV} style={{width:'100%', textAlign:'left', padding:'10px 14px'}}>
                                            📋 完整明細（含逐句分析）
                                        </button>
                                    </div>
                                </div>
                            )}

                            {/* Stats Summary */}
                            {results.length > 0 && (
                                <div className="card fade-in" style={{padding:'20px'}}>
                                    <p style={{fontSize:'9px',fontWeight:'700',color:'var(--text2)',letterSpacing:'0.12em',textTransform:'uppercase',marginBottom:'12px'}}>整體統計</p>
                                    <div className="stat-grid">
                                        <div className="stat-card">
                                            <p className="mono" style={{fontSize:'22px',fontWeight:'700',color:'var(--pos)',margin:0}}>{results.length}</p>
                                            <p style={{fontSize:'9px',color:'var(--text2)',margin:'4px 0 0',textTransform:'uppercase',letterSpacing:'0.08em'}}>已分析樣本</p>
                                        </div>
                                        <div className="stat-card">
                                            <p className="mono" style={{fontSize:'22px',fontWeight:'700',color:'var(--accent2)',margin:0}}>
                                                {(results.reduce((s,r)=>s+r.Tone_T,0)/results.length).toFixed(3)}
                                            </p>
                                            <p style={{fontSize:'9px',color:'var(--text2)',margin:'4px 0 0',textTransform:'uppercase',letterSpacing:'0.08em'}}>平均 Tone_T</p>
                                        </div>
                                        <div className="stat-card">
                                            <p className="mono" style={{fontSize:'22px',fontWeight:'700',color:'var(--pos)',margin:0}}>
                                                {results.filter(r=>r.Tone_T>0).length}
                                            </p>
                                            <p style={{fontSize:'9px',color:'var(--text2)',margin:'4px 0 0',textTransform:'uppercase',letterSpacing:'0.08em'}}>正向樣本數</p>
                                        </div>
                                        <div className="stat-card">
                                            <p className="mono" style={{fontSize:'22px',fontWeight:'700',color:'var(--neg)',margin:0}}>
                                                {results.filter(r=>r.Tone_T<0).length}
                                            </p>
                                            <p style={{fontSize:'9px',color:'var(--text2)',margin:'4px 0 0',textTransform:'uppercase',letterSpacing:'0.08em'}}>負向樣本數</p>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Right Panel */}
                        <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
                            {/* Queue */}
                            <div className="card" style={{padding:'0',overflow:'hidden'}}>
                                <div style={{padding:'14px 20px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                    <span className="mono" style={{fontSize:'9px',fontWeight:'700',color:'var(--text2)',letterSpacing:'0.12em',textTransform:'uppercase'}}>BATCH QUEUE ({batchList.length})</span>
                                    <div style={{display:'flex',gap:'10px'}}>
                                        <button className="btn-ghost" style={{padding:'4px 10px',fontSize:'9px'}} onClick={()=>setBatchList([])}>清除佇列</button>
                                        <button className="btn-ghost" style={{padding:'4px 10px',fontSize:'9px'}} onClick={clearAll}>全部清除</button>
                                    </div>
                                </div>
                                <div className="scroll-area" style={{maxHeight:'160px',padding:'12px 16px'}}>
                                    {batchList.length === 0 ? (
                                        <p style={{textAlign:'center',color:'var(--text2)',fontSize:'11px',padding:'20px',letterSpacing:'0.08em',textTransform:'uppercase'}}>尚未加入任何樣本</p>
                                    ) : (
                                        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:'8px'}}>
                                            {batchList.map((item, idx) => (
                                                <div key={idx} className={`queue-item ${currentIndex===idx?'active':item.status==='done'?'done':item.status==='error'?'error':''}`}>
                                                    <span style={{fontSize:'11px',fontWeight:'700',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.name}</span>
                                                    {item.status==='done' && <span style={{color:'var(--pos)',fontSize:'14px'}}>✓</span>}
                                                    {item.status==='error' && <span style={{color:'var(--neg)',fontSize:'10px',fontWeight:'700'}}>ERR</span>}
                                                    {item.status==='pending' && currentIndex!==idx && <span style={{fontSize:'9px',color:'var(--text2)',fontWeight:'700'}}>WAIT</span>}
                                                    {currentIndex===idx && <div style={{width:'10px',height:'10px',border:'2px solid var(--accent)',borderTop:'transparent',borderRadius:'50%'}} className="spin"></div>}
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Results Table */}
                            <div className="card" style={{overflow:'hidden'}}>
                                <div style={{padding:'14px 20px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                                    <span className="mono" style={{fontSize:'9px',fontWeight:'700',color:'var(--accent2)',letterSpacing:'0.12em',textTransform:'uppercase'}}>EMPIRICAL RESULTS</span>
                                    <span className="mono" style={{fontSize:'9px',color:'var(--text2)'}}>COMPLETED: {results.length}</span>
                                </div>
                                <div className="scroll-area" style={{maxHeight:'480px'}}>
                                    {results.length === 0 ? (
                                        <div style={{padding:'60px',textAlign:'center',color:'var(--text2)',fontSize:'11px',letterSpacing:'0.12em',textTransform:'uppercase'}}>
                                            等待分析輸出...
                                        </div>
                                    ) : (
                                        <table className="results-table">
                                            <thead>
                                                <tr>
                                                    <th>ID / Company</th>
                                                    <th style={{color:'#818cf8'}}>Tone_P</th>
                                                    <th style={{color:'var(--pos)'}}>Tone_Q</th>
                                                    <th style={{color:'white'}}>Tone_T</th>
                                                    <th style={{color:'var(--pos)'}}>正向</th>
                                                    <th style={{color:'var(--neg)'}}>負向</th>
                                                    <th style={{color:'var(--lit)'}}>爭議</th>
                                                    <th style={{color:'var(--unc)'}}>不確定</th>
                                                    <th style={{color:'var(--text2)'}}>有效句</th>
                                                    <th style={{color:'var(--accent2)'}}>AI</th>
                                                    <th style={{color:'var(--accent2)'}}>明細</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {results.map((r, i) => {
                                                    const totPos = r.counts.P.pos+r.counts.P.pos_u+r.counts.Q.pos+r.counts.Q.pos_u;
                                                    const totNeg = r.counts.P.neg+r.counts.P.neg_u+r.counts.Q.neg+r.counts.Q.neg_u;
                                                    const totLit = r.counts.P.lit+r.counts.Q.lit;
                                                    const totUnc = r.counts.P.unc+r.counts.Q.unc;
                                                    const totSent = r.counts.P.total+r.counts.Q.total;
                                                    return (
                                                        <tr key={i} className="fade-in">
                                                            <td style={{fontWeight:'700',color:'var(--text)',maxWidth:'120px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.name}</td>
                                                            <td className="mono" style={{color:getToneColor(r.Tone_P)}}>{r.Tone_P.toFixed(4)}</td>
                                                            <td className="mono" style={{color:getToneColor(r.Tone_Q)}}>{r.Tone_Q.toFixed(4)}</td>
                                                            <td>
                                                                <span className="mono" style={{fontWeight:'700',color:getToneColor(r.Tone_T)}}>{r.Tone_T.toFixed(4)}</span>
                                                                <span className="tone-bar-container">
                                                                    <span className="tone-bar" style={{width:getToneBarWidth(r.Tone_T),background:getToneColor(r.Tone_T),marginLeft:r.Tone_T<0?'auto':'0'}}></span>
                                                                </span>
                                                            </td>
                                                            <td className="mono" style={{color:'var(--pos)'}}>{totPos}</td>
                                                            <td className="mono" style={{color:'var(--neg)'}}>{totNeg}</td>
                                                            <td className="mono" style={{color:'var(--lit)'}}>{totLit}</td>
                                                            <td className="mono" style={{color:'var(--unc)'}}>{totUnc}</td>
                                                            <td className="mono" style={{color:'var(--text2)'}}>{totSent}</td>
                                                            <td>
                                                                {r.aiUsed
                                                                    ? <span className="ai-badge on">✓ AI</span>
                                                                    : <span className="ai-badge off">字典</span>}
                                                            </td>
                                                            <td>
                                                                <button onClick={()=>setDetailTarget(r)}
                                                                    style={{fontSize:'10px',fontWeight:'700',color:'var(--accent2)',background:'transparent',border:'1px solid rgba(124,58,237,0.4)',borderRadius:'6px',padding:'3px 8px',cursor:'pointer',transition:'all 0.15s',whiteSpace:'nowrap'}}
                                                                    onMouseOver={e=>{e.target.style.background='rgba(124,58,237,0.2)';}}
                                                                    onMouseOut={e=>{e.target.style.background='transparent';}}>
                                                                    查看 →
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>

                    <footer style={{marginTop:'40px',textAlign:'center',padding:'20px',borderTop:'1px solid var(--border)'}}>
                        <p className="mono" style={{fontSize:'9px',color:'var(--text2)',letterSpacing:'0.15em',textTransform:'uppercase'}}>
                            ToneTurbo Pro · Standalone Edition · Methodology: Zhang (2015) & Hao-Wang (2024)
                        </p>
                    </footer>

                    {detailTarget && <DetailModal result={detailTarget} onClose={()=>setDetailTarget(null)}/>}
                </div>
            );
        };

        const check = setInterval(() => {
            if (typeof React !== 'undefined' && document.getElementById('root')) {
                clearInterval(check);
                const root = document.getElementById('root');
                root.innerHTML = "";
                ReactDOM.createRoot(root).render(<App />);
            }
        }, 100);
    </script>
</body>
</html>
